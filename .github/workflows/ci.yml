name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Backend — install, validate the Prisma schema, generate the client, and
  # run a syntax smoke-check across every source file. No DB is required.
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (prisma • syntax)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    # `prisma validate` / `prisma generate` read DATABASE_URL but do NOT connect
    # to the database. A placeholder value is enough to satisfy the schema's
    # env("DATABASE_URL") and keep CI free of any real database dependency.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Syntax check (all source files)
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend — install, lint, then typecheck + production build (tsc -b &&
  # vite build). The built assets are uploaded as an artifact for inspection.
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint • build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Non-blocking for now: there is pre-existing lint debt. Lint results are
      # still reported in the logs. Remove `continue-on-error` to make lint a
      # hard gate once the existing errors are resolved.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck & build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist
          retention-days: 7
